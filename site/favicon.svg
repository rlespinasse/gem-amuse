<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#FFE66D"/>

  <!-- Pavilion (bottom triangle) -->
  <polygon points="18,58 110,58 64,106" fill="#87CEEB" stroke="#2D2D2D" stroke-width="4" stroke-linejoin="round"/>

  <!-- Crown (trapezoid middle) -->
  <polygon points="30,32 98,32 110,58 18,58" fill="#D8B4FE" stroke="#2D2D2D" stroke-width="4" stroke-linejoin="round"/>

  <!-- Table (flat top facet) -->
  <rect x="30" y="18" width="68" height="14" rx="3" fill="#FFB6C1" stroke="#2D2D2D" stroke-width="4"/>

  <!-- Facet lines -->
  <line x1="64" y1="32" x2="18" y2="58" stroke="#2D2D2D" stroke-width="2" opacity="0.25"/>
  <line x1="64" y1="32" x2="110" y2="58" stroke="#2D2D2D" stroke-width="2" opacity="0.25"/>
  <line x1="64" y1="58" x2="64" y2="106" stroke="#2D2D2D" stroke-width="2" opacity="0.25"/>

  <!-- Sparkle top-right -->
  <line x1="108" y1="13" x2="108" y2="25" stroke="#2D2D2D" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="102" y1="19" x2="114" y2="19" stroke="#2D2D2D" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Sparkle bottom-left -->
  <line x1="18" y1="95" x2="18" y2="107" stroke="#2D2D2D" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="101" x2="24" y2="101" stroke="#2D2D2D" stroke-width="3" stroke-linecap="round"/>

  <!-- Sparkle top-left (small) -->
  <line x1="16" y1="26" x2="16" y2="34" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="12" y1="30" x2="20" y2="30" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
</svg>
