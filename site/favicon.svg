<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#FFE66D"/>
  <g transform="translate(64,64) rotate(-30) translate(-64,-64)">
    <!-- Pencil body -->
    <rect x="50" y="30" width="28" height="60" rx="2" fill="#FFB6C1" stroke="#2D2D2D" stroke-width="4"/>
    <!-- Pencil tip -->
    <polygon points="50,90 78,90 64,115" fill="#FFD4A3" stroke="#2D2D2D" stroke-width="4" stroke-linejoin="round"/>
    <!-- Pencil tip point -->
    <polygon points="58,105 70,105 64,115" fill="#2D2D2D"/>
    <!-- Pencil top -->
    <rect x="50" y="25" width="28" height="10" rx="2" fill="#87CEEB" stroke="#2D2D2D" stroke-width="4"/>
    <!-- Pencil stripe -->
    <line x1="50" y1="55" x2="78" y2="55" stroke="#2D2D2D" stroke-width="2"/>
    <line x1="50" y1="65" x2="78" y2="65" stroke="#2D2D2D" stroke-width="2"/>
  </g>
</svg>
