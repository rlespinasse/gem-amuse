<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g transform="rotate(-25, 50, 52)">
    <!-- Tip triangle (drawn first so body covers its top edge) -->
    <polygon points="37,68 63,68 50,90" fill="#FFE66D" stroke="#2D2D2D" stroke-width="4" stroke-linejoin="round"/>
    <!-- Tip point -->
    <polygon points="44,82 56,82 50,90" fill="#2D2D2D"/>
    <!-- Crayon body (top corners rounded only via path) -->
    <path d="M 41,14 L 59,14 A 4,4 0 0,1 63,18 L 63,70 L 37,70 L 37,18 A 4,4 0 0,1 41,14 Z" fill="#D8B4FE" stroke="#2D2D2D" stroke-width="4"/>
    <!-- Ferrule band -->
    <rect x="37" y="50" width="26" height="12" fill="#FFD4A3"/>
    <!-- Ferrule border lines -->
    <line x1="37" y1="50" x2="63" y2="50" stroke="#2D2D2D" stroke-width="2"/>
    <line x1="37" y1="62" x2="63" y2="62" stroke="#2D2D2D" stroke-width="2"/>
  </g>
</svg>
